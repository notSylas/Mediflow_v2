name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-prod
  BETTER_AUTH_URL: http://localhost:3000

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: mediflow
          POSTGRES_PASSWORD: mediflow_ci
          POSTGRES_DB: mediflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mediflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mediflow:mediflow_ci@localhost:5432/mediflow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run db:push

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
